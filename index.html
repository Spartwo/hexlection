<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex District Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./static/css/styles.css">
</head>
<body>
<div id="app">
  <div id="body">
    <div id="map-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="map-loader" class="hex-loader"><div class="hex-loader-inner"></div></div>
      <span id="url-status"></span>
    </div>
  </div>
  <div id="right-col">
    <div id="parliament">
      <div id="parl-tabs">
        <button class="ptab active" data-tab="party">Party</button>
        <button class="ptab" data-tab="intl">Group</button>
      </div>
      <div id="parl-canvas-wrap"><canvas id="parl-canvas"></canvas><div id="parl-loader" class="hex-loader"><div class="hex-loader-inner"></div></div></div>
    </div>
    <div id="results-col">
      <div id="results-list-main"></div>
    </div>
  </div>
</div>

<button id="settings-btn" title="Settings">Settings</button>

<div id="settings-overlay">
  <div id="settings-modal">
    <nav id="settings-nav">
      <div class="snav-title">Settings</div>
      <button class="snav-item active" data-panel="data">Data Source</button>
      <button class="snav-item" data-panel="appearance">Appearance</button>
    </nav>
    <div id="settings-body">

      <!-- ── Data Source panel ────────────────────────────────────────────── -->
      <div class="settings-panel active" id="panel-data">
        <div class="spanel-title">Data Source</div>
        <div class="sfield">
          <label for="script-url-input">Apps Script URL</label>
          <input id="script-url-input" type="url" spellcheck="false"
                 placeholder="https://script.google.com/macros/s/.../exec">
          <p class="settings-hint">Paste the deployment URL of your Google Apps Script. It must serve JSON for the sheets: <em>Election, Parties, Zones, Groups, Results</em>.</p>
        </div>
        <div class="sfield-row">
          <button id="settings-reset" class="sbtn-ghost">Reset to default</button>
          <button id="settings-save" class="sbtn-primary">Save &amp; Reload</button>
        </div>
      </div>

      <!-- ── Appearance panel ─────────────────────────────────────────────── -->
      <div class="settings-panel" id="panel-appearance">
        <div class="spanel-title">Appearance</div>
        <div class="sfield">
          <label>Theme</label>
          <div class="sradio-group" id="theme-picker">
            <button class="sradio active" data-theme="dark">Dark</button>
            <button class="sradio" data-theme="light">Light</button>
          </div>
        </div>
      </div>

    </div>
    <button id="settings-close" title="Close">X</button>
  </div>
</div>
<div id="tip">
  <div class="tn" id="t-name"></div>
  <div class="tregion-row">
    <span class="tregion" id="t-region"></span>
    <span class="tturnout" id="t-turnout"></span>
  </div>
  <div class="thexgrid" id="t-hexgrid"></div>
  <div class="tvotes" id="t-votes"></div>
</div>

<!--
  Load order:
    1. helpers.js   — constants + pure utilities
    2. ui.js        — DOM UI (PARTIES, modal, tooltip, results)
    3. map.js       — canvas state + rendering
    4. parliament.js — parliament arc
    5. sheets.js    — async Google Sheets loader
-->
<script src="static/js/helpers.js"></script>
<script src="static/js/ui.js"></script>
<script src="static/js/map.js"></script>
<script src="static/js/parliament.js"></script>
<script src="static/js/sheets.js"></script>

<script>
  // ── Boot ──────────────────────────────────────────────────────────────────
  resizeCanvas();
  render();
  loadFromSheet();

  // ── Settings modal ────────────────────────────────────────────────────────
  const settingsOverlay = document.getElementById('settings-overlay');
  const scriptUrlInput  = document.getElementById('script-url-input');

  function openSettings() {
    scriptUrlInput.value = localStorage.getItem('appsScriptUrl') || '';
    applyThemeButtons();
    settingsOverlay.classList.add('open');
  }
  function closeSettings() { settingsOverlay.classList.remove('open'); }

  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('settings-close').addEventListener('click', closeSettings);
  settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) closeSettings(); });

  // Tab switching
  document.querySelectorAll('.snav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.snav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });
  });

  // Data source
  document.getElementById('settings-reset').addEventListener('click', () => {
    scriptUrlInput.value = '';
  });
  document.getElementById('settings-save').addEventListener('click', () => {
    const val = scriptUrlInput.value.trim();
    if (val) localStorage.setItem('appsScriptUrl', val);
    else localStorage.removeItem('appsScriptUrl');
    closeSettings();
    loadFromSheet();
  });

  // Theme
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    applyThemeButtons();
    render(); // repaint canvas with new bg/stroke colours
    renderParliament(); // repaint parliament with theme-aware empty seat colours
  }
  function applyThemeButtons() {
    const current = localStorage.getItem('theme') || 'dark';
    document.querySelectorAll('.sradio').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === current);
    });
  }
  document.querySelectorAll('.sradio').forEach(btn => {
    btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
  });
  // Apply saved theme on boot
  applyTheme(localStorage.getItem('theme') || 'dark');
</script>

<script>
// ── Hex loader setup ──────────────────────────────────────────────────────
(function() {
  // Build a hex cluster SVG: 1 centre + 6 surrounding hexagons
  function hexPath(cx, cy, r) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 180 * (60 * i - 30);
      pts.push((cx + r * Math.cos(a)).toFixed(2) + ',' + (cy + r * Math.sin(a)).toFixed(2));
    }
    return 'M' + pts.join('L') + 'Z';
  }

  function makeSVG() {
    const S = 72, r = 10, gap = r * 2.15;
    const cx = S / 2, cy = S / 2;
    // Centre hex + 6 surrounding, starting flat-top (0°)
    const centres = [];
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 180 * (60 * i);
      centres.push([cx + gap * Math.cos(a), cy + gap * Math.sin(a)]);
    }
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + S + ' ' + S);
    svg.setAttribute('width', S);
    svg.setAttribute('height', S);
    svg.classList.add('hex-loader-svg');
    centres.forEach(([x, y], i) => {
      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', hexPath(x, y, r));
      path.classList.add('h' + i);
      svg.appendChild(path);
    });
    return svg;
  }

  ['map-loader', 'parl-loader'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      const inner = el.querySelector('.hex-loader-inner');
      inner.appendChild(makeSVG());
    }
  });

  window.showLoaders  = () => {
    document.getElementById('map-loader')?.classList.remove('hidden');
    document.getElementById('parl-loader')?.classList.remove('hidden');
  };
  window.hideLoaders  = () => {
    document.getElementById('map-loader')?.classList.add('hidden');
    document.getElementById('parl-loader')?.classList.add('hidden');
  };

  // Show immediately on page load
  window.showLoaders();
})();
</script>

</body>
</html>
