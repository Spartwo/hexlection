<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex District Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#ede9e3;--muted:#7a7a72;--dim:#3a3a36;--accent:#d4bc7a}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden}
#app{display:grid;grid-template-columns:1fr 380px;height:100vh}
header{display:none}
#party-bar{display:none}
.pbtn{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;font-size:11px;font-weight:500;font-family:"DM Sans",sans-serif;color:var(--muted);background:transparent;white-space:nowrap;user-select:none;transition:color .1s,background .1s,border-color .1s}
.pbtn:hover{color:var(--text);background:var(--surface2)}
.pbtn.active{color:var(--text);background:var(--surface2);border-color:var(--ac,#888)}
.pbtn .sw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.vsep{width:1px;height:20px;background:var(--border);margin:0 6px;flex-shrink:0}
#clrbtn{font-size:11px;padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--muted);font-family:"DM Sans",sans-serif;transition:all .12s;flex-shrink:0}
#clrbtn:hover{color:var(--text);border-color:var(--muted)}
#body{display:contents}
#map-wrap{position:relative;overflow:hidden;background:var(--bg);cursor:crosshair}
#map-canvas{display:block;position:absolute;top:0;left:0}
#url-bar{display:none}
#url-bar label{font-size:11px;color:var(--muted);white-space:nowrap}
#url-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:4px 8px;font-size:11px;color:var(--text);font-family:"DM Mono",monospace;min-width:0}
#url-input:focus{outline:none;border-color:var(--accent)}
#url-go{font-size:11px;padding:4px 10px;border-radius:5px;border:none;background:var(--accent);color:#000;cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:500;white-space:nowrap;flex-shrink:0}
#url-go:hover{opacity:.85}
#url-status{font-size:10px;color:var(--muted);white-space:nowrap;min-width:60px}
#sidebar{display:none}
.sh{font-size:10px;font-weight:500;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;font-family:"DM Mono",monospace;margin-bottom:8px}
.rrow{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.rrow:last-child{border-bottom:none}
.rsw{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.rname{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcount{font-family:"DM Mono",monospace;font-size:12px;font-weight:600;color:var(--text);min-width:30px;text-align:right}
.rrow.has .rname{color:var(--text)}
#total{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace;padding-top:8px;margin-top:4px}
#total strong{color:var(--text)}
.majlabel{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);font-family:"DM Mono",monospace;margin:8px 0 4px}
.majtrack{height:2px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:8px}
.majfill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
#edit-btn{display:none}

/* ── Right column ────────────────────────────────────────────────────────── */
#right-col{display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);overflow:hidden;height:100vh}
#parliament{display:flex;flex-direction:column;flex-shrink:0}
#parl-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{padding:8px 14px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:"DM Sans",sans-serif;border-bottom:2px solid transparent;transition:color .12s,border-color .12s;white-space:nowrap;flex:1;text-align:center}
.ptab:hover{color:var(--text)}
.ptab.active{color:var(--text);border-bottom-color:var(--accent)}
#parl-canvas-wrap{position:relative;overflow:hidden;height:260px;flex-shrink:0;border-bottom:1px solid var(--border)}
#parl-canvas{display:block;width:100%;height:100%}
/* ── Results list ─────────────────────────────────────────────────────────── */
#results-col{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:0;min-height:0}
.rrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.rrow:last-child{border-bottom:none}
.rsw{width:10px;height:26px;border-radius:2px;flex-shrink:0}
.rname{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.rcount{font-family:"DM Mono",monospace;font-size:13px;font-weight:600;color:var(--text);min-width:30px;text-align:right}
.rrow.has .rname{color:var(--text)}
#results-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0}
#total{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
#total strong{color:var(--text)}
.majlabel{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);font-family:"DM Mono",monospace;margin:6px 0 3px}
.majtrack{height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
.majfill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
/* hide old elements */
#parl-legend{display:none}
.pl-item,.pl-swatch,.pl-name,.pl-count{display:none}
#edit-btn{display:none}
#sidebar{display:none}

#tip{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:10px 12px;font-size:12px;pointer-events:none;z-index:999;display:none;color:var(--text);box-shadow:0 6px 24px rgba(0,0,0,.6);min-width:160px;max-width:240px}
#tip .tn{font-weight:600;margin-bottom:1px;font-size:13px}
#tip .tregion{font-size:10px;color:var(--muted);margin-bottom:8px}
#tip .thexgrid{display:grid;grid-template-columns:repeat(4,20px);gap:3px;margin-bottom:8px}
#tip .tvotes{font-size:10px;color:var(--muted);font-family:"DM Mono",monospace;display:flex;flex-direction:column;gap:2px}
#tip .tvrow{display:flex;justify-content:space-between;gap:12px}
#tip .tvrow .tvcol{display:flex;align-items:center;gap:4px}
#tip .tvrow .tvsw{width:7px;height:7px;border-radius:1px;flex-shrink:0}
#tip .tvrow.other{color:var(--dim)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:20px;width:340px;max-height:80vh;overflow-y:auto}
#modal h2{font-size:14px;font-weight:500;margin-bottom:14px}
.per{display:grid;grid-template-columns:28px 1fr 28px;gap:8px;align-items:center;margin-bottom:8px}
.per input[type=color]{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:4px;padding:0}
.per input[type=text]{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;font-size:12px;color:var(--text);font-family:"DM Sans",sans-serif;width:100%}
.per button{background:none;border:1px solid var(--border2);border-radius:5px;color:var(--muted);cursor:pointer;font-size:14px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.per button:hover{color:var(--text);border-color:var(--muted)}
#modal-footer{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
#modal-footer button{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif}
#modal-save{background:var(--accent);color:#000;border:none;font-weight:500}
#modal-cancel{background:none;border:1px solid var(--border2);color:var(--muted)}
#add-party-btn{background:none;border:1px dashed var(--border2);border-radius:5px;color:var(--muted);cursor:pointer;font-size:11px;padding:6px;width:100%;margin-top:4px;font-family:"DM Sans",sans-serif}
#add-party-btn:hover{color:var(--text);border-color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <header></header>
  <div id="body">
    <div id="map-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="url-bar">
        <input id="url-input" type="text" value="" placeholder="https://…">
        <span id="url-status"></span>
      </div>
    </div>
    <div id="sidebar"><div id="results-list"></div><div id="total"></div><div class="majtrack"><div class="majfill" id="maj-fill" style="width:0%"></div></div><span id="maj-n" style="display:none"></span><button id="edit-btn"></button></div>
  </div>
  <div id="right-col">
    <div id="parliament">
      <div id="parl-tabs">
        <button class="ptab active" data-tab="party">Party</button>
        <button class="ptab" data-tab="intl">Intl. Group</button>
        <button class="ptab" data-tab="nation">Nation</button>
      </div>
      <div id="parl-canvas-wrap"><canvas id="parl-canvas"></canvas></div>
    </div>
    <div id="results-col">
      <div id="results-list-main"></div>
    </div>
    <div id="results-footer">
      <div id="total-main">—</div>
      <div class="majlabel"><span>Majority threshold</span><span id="maj-n-main">—</span></div>
      <div class="majtrack"><div class="majfill" id="maj-fill-main" style="width:0%"></div></div>
    </div>
  </div>
</div>
<div id="modal-overlay">
  <div id="modal">
    <h2>Edit Parties</h2>
    <div id="party-edit-list"></div>
    <button id="add-party-btn" onclick="addParty()">+ Add party</button>
    <div id="modal-footer">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>
<div id="tip">
  <div class="tn" id="t-name"></div>
  <div class="tregion" id="t-region"></div>
  <div class="thexgrid" id="t-hexgrid"></div>
  <div class="tvotes" id="t-votes"></div>
  <div style="display:none" id="t-party"><div id="t-psw"></div><span id="t-pname"></span>
  </div>
</div>
<script>
const SQRT3 = Math.sqrt(3);
const SCALE_X = 0.10;
const SCALE_Y = 0.10 * 1.5 / SQRT3;
const BLK = 40;
const MIN_TERRITORY_PX = 80;

const FILL_UNASSIGNED  = '#23232a';
const STROKE_INTERNAL  = 'rgba(255,255,255,0.03)';
const WIDTH_INTERNAL   = 1.0;
const STROKE_BOUNDARY  = 'rgba(255,255,255,0.80)';
const WIDTH_BOUNDARY   = 2.0;

let PARTIES = [];
let parlTab    = 'party'; // active parliament tab
let parlFilter = null;    // selected legend filter

// ── Google Sheets integration ─────────────────────────────────────────────
const SHEET_ID = '1Sf_FElbmBA7-JCL9s0MB5wVRW-Gz4TviA5K_QJwPXDU';

// Fetch sheet via Google Apps Script Web App — works from file: origin, no column limits
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqzq7L0IBrq38iEpG2r5u2Z7wJuIx0FlK11F7FFFtneGQqUoqQ_xo2AvjjL7CQfHlO/exec';

async function fetchSheet(sheetName) {
  const url = `${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Sheet fetch failed: ' + sheetName);
  return res.json(); // already returns array of row objects keyed by header
}

function csvToObjects(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] !== undefined ? row[i] : ''; });
    return obj;
  });
}

function parseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], nx = text[i+1];
    if (inQ) {
      if (ch === '"' && nx === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur = ''; }
      else if (ch === '\r' && nx === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; i++; }
      else if (ch === '\n' || ch === '\r') { row.push(cur); rows.push(row); row = []; cur = ''; }
      else cur += ch;
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

async function loadFromSheet() {
  setStatus('loading sheet…');
  try {
    const [electionRows, partyRows, zoneRows, groupsRaw] = await Promise.all([
      fetchSheet('Election'),
      fetchSheet('Parties'),
      fetchSheet('Zones'),
      fetchSheet('Groups'),
    ]);

    // ── 1. Image URL from Election!B2 ─────────────────────────────────────
    // opensheet uses row 1 as headers; row 2 is the first data row (index 0).
    // Election!B2 = the value in column B of the first data row.
    // We find whichever column in the first row contains a URL.
    if (!electionRows.length) { setStatus('Election sheet empty', true); return; }
    let imageUrl = '';
    for (const val of Object.values(electionRows[0])) {
      if ((val || '').trim().startsWith('http')) { imageUrl = val.trim(); break; }
    }
    if (!imageUrl) { setStatus('no image URL found in Election!B2', true); return; }

    // ── 2. Parties from Parties! ──────────────────────────────────────────
    // opensheet uses row 1 as column headers.
    // The "Shorthand" column (col B) is what gets transposed into Zones as vote-share headers.
    // Expected headers: Party | Shorthand | Summary | Hexcode | ...
    if (!partyRows.length) { setStatus('Parties sheet empty', true); return; }
    PARTIES = partyRows.map((row, i) => {
      // Be flexible: find the first non-empty string column as name,
      // and look for recognisable header names case-insensitively.
      const keys = Object.keys(row);
      // Find columns by content pattern rather than fixed names,
      // in case header row shifts.
      const nameKey    = keys.find(k => /party|name/i.test(k))    || keys[0];
      const shortKey   = keys.find(k => /short|abbr|abbrev/i.test(k)) || keys[1];
      const summaryKey = keys.find(k => /summary|desc/i.test(k));
      const hexKey     = keys.find(k => /hex|colour|color/i.test(k));
      const nationKey  = keys.find(k => /nation|country/i.test(k));
      const intlKey    = keys.find(k => k.trim() === 'International Group') || keys.find(k => /intl|international/i.test(k));

      const name    = (row[nameKey]    || '').trim();
      const short   = (row[shortKey]   || '').trim();
      const summary = summaryKey ? (row[summaryKey] || '').trim() : '';
      const rawHex  = hexKey ? (row[hexKey] || '').trim().replace(/^#/, '') : '';
      const nation  = nationKey ? (row[nationKey] || '').trim() : '';
      const intlGrp = intlKey  ? (row[intlKey]   || '').trim() : '';
      const color   = /^[0-9a-fA-F]{6}$/.test(rawHex) ? '#' + rawHex : '#888888';
      return { id: 'p' + i, name, short, summary, color, nation, intlGrp };
    }).filter(p => p.name);

    // Build a shorthand → party lookup for vote-share matching
    const partyByShort = {};
    PARTIES.forEach(p => { if (p.short) partyByShort[p.short] = p; });

    // ── 3. Zones from Zones! ──────────────────────────────────────────────
    // Row 1 = headers. The "Zones" anchor word appears as the column header
    // for the Region column (col A). Actual headers:
    //   Region | Province | Population | Apportionment | Seats | Hexcode | Turnout | <party shorthands…>
    //
    // We find the FIXED columns by looking for them in the header keys,
    // then treat everything else as party vote-share columns.
    if (!zoneRows.length) { setStatus('Zones sheet empty', true); return; }

    const zoneKeys = Object.keys(zoneRows[0]);

    // Find each fixed column key case-insensitively, falling back to position
    const findKey = (patterns, fallbackIdx) =>
      zoneKeys.find(k => patterns.some(p => new RegExp(p, 'i').test(k.trim())))
      || zoneKeys[fallbackIdx];

    const regionKey = findKey(['region','zone'],         0);
    const nameKey   = findKey(['province','name'],       1);
    // skip population (col 2) and apportionment (col 3)
    const seatsKey  = findKey(['seats'],                 4);
    const hexKey    = findKey(['hex','colour','color'],  5);
    const turnoutKey= findKey(['turnout'],               6);

    // Fixed columns to exclude — vote-share cols are everything else
    const FIXED_KEYS = new Set(
      [regionKey, nameKey, seatsKey, hexKey, turnoutKey,
       findKey(['pop'],2), findKey(['appor'],3)]
      .filter(Boolean).map(k => k.trim())
    );

    // Vote-share column keys = party shorthands, in sheet order
    const voteKeys = zoneKeys.filter(k => !FIXED_KEYS.has(k.trim()));

    window.ZONES = zoneRows.map((row, i) => {
      const region  = (row[regionKey] || '').trim();
      const name    = (row[nameKey]   || '').trim();
      const seats   = parseInt((row[seatsKey] || '1').replace(/,/g, '')) || 1;
      const rawHex  = (row[hexKey]    || '').trim().replace(/^#/, '');
      const color   = /^[0-9a-fA-F]{6}$/.test(rawHex) ? '#' + rawHex.toLowerCase() : null;
      const turnout = parseFloat((row[turnoutKey] || '0').replace(/%/g, '')) || 0;

      // Parse vote shares — column headers ARE the party shorthands
      const votes = {};
      let winner = null, winPct = 0;
      voteKeys.forEach(k => {
        const short = k.trim();
        const raw = (row[k] || '0').trim();
        const hasPercent = raw.includes('%');
        const pct = (parseFloat(raw.replace(/%/g,'')) || 0) / (hasPercent ? 100 : 1);
        votes[short] = pct;
        if (pct > winPct) { winPct = pct; winner = short; }
      });

      return { id: 'z' + i, region, name, seats, color, votes, winner, winPct, turnout };
    }).filter(z => z.name);

    // ── 4. ZONE_DISPLAY: map image hexcode → fill colour + metadata ───────
    // Winning party colour blended by margin strength.
    // Strength: normalised between random-chance floor (1/n parties) and 70% ceiling.
    const numParties = voteKeys.length || 1;
    const floor      = 1 / numParties;
    const ceil       = 0.70;

    function blendToWhite(hexColor, strength) {
      const r = parseInt(hexColor.slice(1,3),16);
      const g = parseInt(hexColor.slice(3,5),16);
      const b = parseInt(hexColor.slice(5,7),16);
      const t = 0.25 + strength * 0.75;
      return '#' + [
        Math.round(255 + (r-255)*t),
        Math.round(255 + (g-255)*t),
        Math.round(255 + (b-255)*t),
      ].map(v => v.toString(16).padStart(2,'0')).join('');
    }

    window.ZONE_DISPLAY = {}; // party colours — built now
    window.ZONES.forEach(zone => {
      if (!zone.color) return;
      const party = zone.winner ? partyByShort[zone.winner] : null;
      if (!party) { window.ZONE_DISPLAY[zone.color] = { color: FILL_UNASSIGNED, party: null, zone }; return; }
      const strength = Math.max(0, Math.min(1, (zone.winPct - floor) / (ceil - floor)));
      window.ZONE_DISPLAY[zone.color] = { color: blendToWhite(party.color, strength), party, zone };
      tState[zone.color] = party.id;
    });
    // ZONE_DISPLAY_INTL built after step 4b once GROUPS is populated

    // ── 4b. Parse Groups sheet ────────────────────────────────────────────
    // Groups sheet columns repeat: row1=shorthand(header), row2=fullname, row6=hexcode
    // Apps Script uses row 1 as column headers, so:
    //   groupsRaw[0] = { shorthand: shorthand, ... }  (row 2, full names)
    //   groupsRaw[4] = { shorthand: hexcode, ... }    (row 6, 0-indexed = index 4)
    // Wait — Apps Script skips row 1 (headers) so index 0 = row 2, index 4 = row 6
    window.GROUPS = {};
    if (groupsRaw && groupsRaw.length > 0) {
      // Row 1 became the keys. Row 2 (index 0) = full names. Row 6 (index 4) = hexcodes.
      const nameRow  = groupsRaw[0]; // row 2 = full names (index 0 after header stripped)
      const colorRow = groupsRaw[4]; // row 6 = hexcodes  (index 4 after header stripped)
      if (nameRow) {
        Object.keys(nameRow).forEach(short => {
          if (!short || short.trim() === '') return;
          const name   = (nameRow[short] || short).trim();
          const rawHex = colorRow ? (colorRow[short] || '').trim().replace(/^#/, '') : '';
          const color  = /^[0-9a-fA-F]{6}$/.test(rawHex) ? '#' + rawHex : '#888888';
          window.GROUPS[short.trim()] = { name, color };
        });
      }
    }

    // ── 4c. Build ZONE_DISPLAY_INTL now that GROUPS is populated ─────────
    window.ZONE_DISPLAY_INTL = {};
    window.ZONES.forEach(zone => {
      if (!zone.color) return;
      const party = zone.winner ? partyByShort[zone.winner] : null;
      const group = party && party.intlGrp ? (window.GROUPS || {})[party.intlGrp] : null;
      if (!party) { window.ZONE_DISPLAY_INTL[zone.color] = { color: FILL_UNASSIGNED, party: null, zone }; return; }
      const strength = Math.max(0, Math.min(1, (zone.winPct - floor) / (ceil - floor)));
      window.ZONE_DISPLAY_INTL[zone.color] = { color: blendToWhite(group ? group.color : party.color, strength), party, zone };
    });

    // ── 5. Boot UI ────────────────────────────────────────────────────────
    buildPartyBar();
    selParty = PARTIES[0] ? PARTIES[0].id : null;
    renderResults();
    buildSeats();
    buildParlLegend();
    renderParliament();

    setStatus('loading image…');
    document.getElementById('url-input').value = imageUrl;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => processImage(img);
    img.onerror = () => {
      const i2 = new Image();
      i2.onload  = () => processImage(i2);
      i2.onerror = () => setStatus('image load failed', true);
      i2.src = imageUrl;
    };
    img.src = imageUrl;

  } catch(err) {
    setStatus('error: ' + err.message, true);
    console.error(err);
  }
}

const tState = {};
let selParty = null;
let origColors = null;
let GRID_COLS = 0, GRID_ROWS = 0;
let territoryCount = 0;

const canvas  = document.getElementById('map-canvas');
const ctx     = canvas.getContext('2d');
const mapWrap = document.getElementById('map-wrap');

let r = 6, originX = 0, originY = 0, zoom = 1, panX = 0, panY = 0;

function resizeCanvas() {
  canvas.width  = mapWrap.clientWidth;
  canvas.height = mapWrap.clientHeight;
}

function computeLayout() {
  resizeCanvas();
  if (!GRID_COLS || !GRID_ROWS) return;
  const pad   = 24;
  const gridW = GRID_COLS * 1.5 + 0.5;
  const gridH = GRID_ROWS * SQRT3 + SQRT3 / 2;
  const fitW  = (canvas.width  - pad * 2) / gridW;
  const fitH  = (canvas.height - pad * 2) / gridH;
  r = Math.max(1, Math.min(fitW, fitH));
  originX = (canvas.width  - gridW * r) / 2;
  originY = (canvas.height - gridH * r) / 2;
  zoom = 1; panX = 0; panY = 0;
}

function cellCenter(col, row) {
  const er = r * zoom;
  return {
    cx: originX + panX + col * 1.5 * er + er,
    cy: originY + panY + row * SQRT3 * er + er * SQRT3 / 2 + (col % 2 === 1 ? er * SQRT3 / 2 : 0)
  };
}

// Flat-top hex: the 6 neighbours, one per edge (edge i is between corner i and corner i+1)
function getNeighbour(col, row, ei) {
  // Canvas Y-down, flat-top hex, odd columns shift DOWN by √3/2·r
  // Verified against actual cell centre positions for all col parities.
  const odd = col % 2 === 1;
  return [
    [col + 1, odd ? row + 1 : row    ],  // edge 0: lower-right
    [col,     row + 1                ],  // edge 1: below
    [col - 1, odd ? row + 1 : row    ],  // edge 2: lower-left
    [col - 1, odd ? row     : row - 1],  // edge 3: upper-left
    [col,     row - 1                ],  // edge 4: above
    [col + 1, odd ? row     : row - 1],  // edge 5: upper-right
  ][ei];
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!origColors) return;

  const er = r * zoom;

  // ── Pass 1: territory fills — trace outer boundary of each colour group ─────
  // Collect all boundary edges per territory colour, then chain them into
  // closed loops and fill each loop as a single polygon. No seams possible.
  {
    // Directed half-edge walk — builds directed edges and traces loops in one pass.
    // Each boundary edge is stored as a DIRECTED edge: territory always on the LEFT.
    // For a flat-top hex, edge ei goes from corner ei → corner (ei+1)%6.
    // The territory is on the left when we walk in that direction if the hex is to our left.
    // We use the directed edge map: startPtKey → [directed edge objects]
    // Following directed edges naturally traces closed outer loops with no ambiguity.
    // We already have edges as {x1,y1,x2,y2} — but they're undirected.
    // We need to re-derive directed edges from the original hex grid scan.
    // The directed boundary edge for hex (col,row) on edge ei goes:
    //   corner ei → corner (ei+1)%6  (territory on LEFT = inside)
    // This is already the correct winding for exterior boundary tracing.

    const SNAP = 0.5;
    function ptKey(x,y){ return Math.round(x/SNAP)+'_'+Math.round(y/SNAP); }
    const coordOf = {};

    // dirEdges[color]: map from startKey → [{endKey, x2, y2}]
    const dirEdges = {};

    for (let col = 0; col < GRID_COLS; col++) {
      for (let row = 0; row < GRID_ROWS; row++) {
        const hexA = origColors[row] && origColors[row][col];
        if (!hexA) continue;
        const {cx, cy} = cellCenter(col, row);
        for (let ei = 0; ei < 6; ei++) {
          const [nc, nr] = getNeighbour(col, row, ei);
          const inBounds = nc >= 0 && nc < GRID_COLS && nr >= 0 && nr < GRID_ROWS;
          const hexB = inBounds ? (origColors[nr] && origColors[nr][nc]) : null;
          if (hexA === hexB) continue; // internal, skip

          // Directed edge: corner ei → corner (ei+1)%6, territory (hexA) on left
          const a1 = Math.PI/3 * ei;
          const a2 = Math.PI/3 * ((ei+1)%6);
          const x1 = cx + er*Math.cos(a1), y1 = cy + er*Math.sin(a1);
          const x2 = cx + er*Math.cos(a2), y2 = cy + er*Math.sin(a2);
          const k1 = ptKey(x1,y1), k2 = ptKey(x2,y2);
          coordOf[k1] = {x:x1,y:y1};
          coordOf[k2] = {x:x2,y:y2};

          if (!dirEdges[hexA]) dirEdges[hexA] = {};
          if (!dirEdges[hexA][k1]) dirEdges[hexA][k1] = [];
          dirEdges[hexA][k1].push({key:k2,x:x2,y:y2});
        }
      }
    }

    // Walk directed edges into loops per colour
    for (const [hexColor, startMap] of Object.entries(dirEdges)) {
      const displayMap = (parlTab === 'intl') ? window.ZONE_DISPLAY_INTL : window.ZONE_DISPLAY;
      const zd = displayMap && displayMap[hexColor];
      const fillColor = zd ? zd.color : FILL_UNASSIGNED;

      // Copy adjacency so we can consume edges
      const remaining = {};
      for (const [k,arr] of Object.entries(startMap)) remaining[k] = [...arr];

      const loops = [];

      for (const startKey of Object.keys(remaining)) {
        while ((remaining[startKey]||[]).length > 0) {
          const loop = [];
          let curKey = startKey;
          let safety = Object.keys(remaining).length * 6 + 10;

          while (safety-- > 0) {
            const nexts = remaining[curKey];
            if (!nexts || nexts.length === 0) break;
            const next = nexts.shift(); // consume the directed edge
            loop.push(coordOf[curKey]);
            if (next.key === startKey) break; // closed loop
            curKey = next.key;
          }

          if (loop.length >= 3) loops.push(loop);
        }
      }

      ctx.beginPath();
      for (const loop of loops) {
        ctx.moveTo(loop[0].x, loop[0].y);
        for (let i = 1; i < loop.length; i++) ctx.lineTo(loop[i].x, loop[i].y);
        ctx.closePath();
      }
      ctx.fillStyle = fillColor;
      ctx.fill('evenodd');

      // Cache loops for filter overlay in pass 1b
      if (!window._territoryLoops) window._territoryLoops = {};
      window._territoryLoops[hexColor] = loops;
    }
    // Reset cache each render so stale data doesn't persist after zoom/pan
    // (loops are world-space coords so they DO change with zoom — recomputed each frame)
  }

  // ── Pass 1b: parliament filter overlay ──────────────────────────────────
  const pf = window.PARL_FILTER;
  if (pf && pf.value !== null && window._territoryLoops) {
    const matchColors = new Set();

    if (pf.tab === 'party' || pf.tab === 'nation') {
      // Party: zone where that party won plurality
      // Nation: zone in that region
      (window.ZONES || []).forEach(zone => {
        if (!zone.color) return;
        let match = false;
        if (pf.tab === 'party')  match = zone.winner === pf.value;
        if (pf.tab === 'nation') match = zone.region === pf.value;
        if (match) matchColors.add(zone.color);
      });
    } else if (pf.tab === 'intl') {
      // Intl group: highlight zones that have ANY allocated seats from this group
      // Build set of province names that have seats from this group
      const matchProvinces = new Set();
      (window.SEATS || []).forEach(seat => {
        if (seat.intlGrp === pf.value) matchProvinces.add(seat.province);
      });
      (window.ZONES || []).forEach(zone => {
        if (zone.color && matchProvinces.has(zone.name)) matchColors.add(zone.color);
      });
    }
    ctx.save();
    for (const [hexColor, loops] of Object.entries(window._territoryLoops)) {
      if (matchColors.has(hexColor)) continue;
      ctx.beginPath();
      for (const loop of loops) {
        ctx.moveTo(loop[0].x, loop[0].y);
        for (let i = 1; i < loop.length; i++) ctx.lineTo(loop[i].x, loop[i].y);
        ctx.closePath();
      }
      ctx.fillStyle = 'rgba(13,13,13,0.65)';
      ctx.fill('evenodd');
    }
    ctx.restore();
  }

  // ── Pass 2: edges — deduplicated via a Set ────────────────────────────────
  // For each edge between hex A (col,row) and hex B (nc,nr):
  //   canonical key = "minCol,minRow,maxCol,maxRow" — but since col/row pairs
  //   don't sort cleanly, encode as "col1:row1|col2:row2" with the smaller one first.
  //
  // For map-edge hexes (neighbour outside grid), key = "col,row|edge:i"
  // This guarantees every edge is processed exactly once.

  const seen    = new Set();
  const internal  = [];  // [x1,y1,x2,y2, ...]
  const boundary  = [];

  for (let col = 0; col < GRID_COLS; col++) {
    for (let row = 0; row < GRID_ROWS; row++) {
      const hexA = origColors[row] && origColors[row][col];
      if (!hexA) continue;
      const {cx, cy} = cellCenter(col, row);
      if (cx + er * 2 < 0 || cx - er * 2 > canvas.width)  continue;
      if (cy + er * 2 < 0 || cy - er * 2 > canvas.height) continue;

      for (let ei = 0; ei < 6; ei++) {
        const [nc, nr] = getNeighbour(col, row, ei);
        const inBounds = nc >= 0 && nc < GRID_COLS && nr >= 0 && nr < GRID_ROWS;

        // Build a canonical key so each edge is only processed once
        let key;
        if (inBounds) {
          // Sort the two hex coords to get a consistent key
          const [c1, r1, c2, r2] = col < nc || (col === nc && row < nr)
            ? [col, row, nc, nr]
            : [nc, nr, col, row];
          key = c1 + ',' + r1 + '|' + c2 + ',' + r2;
        } else {
          // Map boundary — unique to this hex+edge
          key = col + ',' + row + '|e' + ei;
        }
        if (seen.has(key)) continue;
        seen.add(key);

        const hexB = inBounds ? (origColors[nr] && origColors[nr][nc]) : null;

        // Corner indices for edge ei: corners ei and (ei+1)%6
        const a1 = Math.PI / 3 * ei;
        const a2 = Math.PI / 3 * ((ei + 1) % 6);
        const x1 = cx + er * Math.cos(a1), y1 = cy + er * Math.sin(a1);
        const x2 = cx + er * Math.cos(a2), y2 = cy + er * Math.sin(a2);

        // Boundary = different territory hex on the other side (or map edge with no hex)
        const isBoundary = hexA !== hexB;  // null !== hexA is always true (map edge)

        if (isBoundary) {
          boundary.push(x1, y1, x2, y2);
        } else {
          internal.push(x1, y1, x2, y2);
        }
      }
    }
  }

  // Draw internal lines first (underneath)
  if (internal.length) {
    ctx.beginPath();
    for (let i = 0; i < internal.length; i += 4) {
      ctx.moveTo(internal[i], internal[i+1]);
      ctx.lineTo(internal[i+2], internal[i+3]);
    }
    // Match external border scaling — same lineWidth, just lower opacity fading in with zoom
    const internalAlpha = Math.max(0, Math.min(1, (zoom - 2) / 4));
    ctx.strokeStyle = `rgba(255,255,255,${(internalAlpha * 0.12).toFixed(3)})`;
    ctx.lineWidth   = WIDTH_BOUNDARY;
    ctx.stroke();
  }

  // Draw territory boundaries on top
  if (boundary.length) {
    ctx.beginPath();
    for (let i = 0; i < boundary.length; i += 4) {
      ctx.moveTo(boundary[i], boundary[i+1]);
      ctx.lineTo(boundary[i+2], boundary[i+3]);
    }
    ctx.strokeStyle = STROKE_BOUNDARY;
    ctx.lineWidth   = WIDTH_BOUNDARY;
    ctx.stroke();
  }
}

// ── Hit test ──────────────────────────────────────────────────────────────
function inHex(sx, sy, cx, cy, er) {
  const dx = Math.abs(sx - cx), dy = Math.abs(sy - cy);
  if (dx > er) return false;
  if (dy > er * SQRT3 / 2) return false;
  return er * SQRT3 / 2 - dy - (SQRT3 / 2) * (dx - er / 2) >= 0 || dx <= er / 2;
}

function toGrid(sx, sy) {
  const er     = r * zoom;
  const colEst = Math.floor((sx - originX - panX - er / 2) / (1.5 * er));
  for (let dc = -1; dc <= 2; dc++) {
    const col = colEst + dc;
    if (col < 0 || col >= GRID_COLS) continue;
    const {cx: cx0, cy: cy0} = cellCenter(col, 0);
    const rowEst = Math.floor((sy - cy0 + er * SQRT3 / 2) / (SQRT3 * er));
    for (let dr = -1; dr <= 1; dr++) {
      const row = rowEst + dr;
      if (row < 0 || row >= GRID_ROWS) continue;
      if (!origColors || !origColors[row] || !origColors[row][col]) continue;
      const {cx, cy} = cellCenter(col, row);
      if (inHex(sx, sy, cx, cy, er)) return {col, row};
    }
  }
  return null;
}

// ── Image processing ──────────────────────────────────────────────────────
function processImage(img) {
  const W = img.naturalWidth, H = img.naturalHeight;
  setStatus('analysing\u2026');
  const full = document.createElement('canvas');
  full.width = W; full.height = H;
  full.getContext('2d').drawImage(img, 0, 0);
  const fullPx = full.getContext('2d').getImageData(0, 0, W, H).data;

  const freq = {};
  for (let i = 0; i < fullPx.length; i += 4) {
    const rv = fullPx[i], gv = fullPx[i+1], bv = fullPx[i+2];
    if (rv < BLK && gv < BLK && bv < BLK) continue;
    const key = (rv << 16) | (gv << 8) | bv;
    freq[key] = (freq[key] || 0) + 1;
  }
  const trueColors = Object.entries(freq)
    .filter(([,n]) => n >= MIN_TERRITORY_PX)
    .map(([k]) => { const ki=parseInt(k); return [(ki>>16)&0xff,(ki>>8)&0xff,ki&0xff]; });

  const tcFlat = new Float32Array(trueColors.length * 3);
  const tcHex  = [];
  trueColors.forEach(([rv,gv,bv],i) => {
    tcFlat[i*3]=rv; tcFlat[i*3+1]=gv; tcFlat[i*3+2]=bv;
    tcHex.push('#'+[rv,gv,bv].map(v=>v.toString(16).padStart(2,'0')).join(''));
  });

  function snapToTrue(rv,gv,bv) {
    let bestDist=Infinity, bestIdx=0;
    for (let i=0; i<tcHex.length; i++) {
      const dr=tcFlat[i*3]-rv, dg=tcFlat[i*3+1]-gv, db=tcFlat[i*3+2]-bv;
      const d=dr*dr+dg*dg+db*db;
      if (d<bestDist){bestDist=d;bestIdx=i;}
    }
    return tcHex[bestIdx];
  }

  const NW=Math.max(1,Math.round(W*SCALE_X)), NH=Math.max(1,Math.round(H*SCALE_Y));
  const bw=W/NW, bh=H/NH;
  GRID_COLS=NW; GRID_ROWS=NH;
  origColors=[];
  const uniqueHex=new Set();
  Object.keys(tState).forEach(k=>delete tState[k]);

  for (let row=0; row<NH; row++) {
    origColors[row]=[];
    for (let col=0; col<NW; col++) {
      const sx=Math.min(W-1,Math.floor((col+0.5)*bw));
      const sy=Math.min(H-1,Math.floor((row+0.5)*bh));
      const idx=(sy*W+sx)*4;
      let rv=fullPx[idx],gv=fullPx[idx+1],bv=fullPx[idx+2];
      if (rv<BLK&&gv<BLK&&bv<BLK) {
        let found=null;
        for (const [ox,oy] of [[0.3,0.3],[0.7,0.3],[0.3,0.7],[0.7,0.7]]) {
          const x2=Math.min(W-1,Math.floor(col*bw+ox*bw));
          const y2=Math.min(H-1,Math.floor(row*bh+oy*bh));
          const i2=(y2*W+x2)*4;
          const r2=fullPx[i2],g2=fullPx[i2+1],b2=fullPx[i2+2];
          if(!(r2<BLK&&g2<BLK&&b2<BLK)){found=[r2,g2,b2];break;}
        }
        if(!found){origColors[row][col]=null;continue;}
        [rv,gv,bv]=found;
      }
      const snapped=snapToTrue(rv,gv,bv);
      origColors[row][col]=snapped;
      uniqueHex.add(snapped);
    }
  }

  territoryCount=uniqueHex.size;
  document.getElementById('hdr-sub').textContent=territoryCount+' territories \u00b7 '+NW+'\u00d7'+NH+' grid';
  document.getElementById('total').textContent='0\u00a0/\u00a0'+territoryCount+' assigned';
  document.getElementById('maj-n').textContent=Math.floor(territoryCount/2)+1;
  setStatus('');
  computeLayout(); renderResults(); render();
}

// ── Tooltip helpers ──────────────────────────────────────────────────────

// Flat-top hexagon SVG path for a given radius
function flatHexPath(r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i; // flat-top: 0° = right point
    pts.push((r + r * Math.cos(a)).toFixed(2) + ',' + (r + r * Math.sin(a)).toFixed(2));
  }
  return 'M' + pts.join('L') + 'Z';
}

// Largest remainder (Hamilton) seat allocation
// parties: [{id, color, votes}], totalSeats: int
// returns [{id, color, seats}]
function allocateSeats(parties, totalSeats) {
  const total = parties.reduce((s, p) => s + p.votes, 0);
  if (total <= 0 || totalSeats <= 0) return parties.map(p => ({ ...p, seats: 0 }));
  const quotas = parties.map(p => ({ ...p, quota: p.votes / total * totalSeats }));
  quotas.forEach(p => { p.seats = Math.floor(p.quota); p.rem = p.quota - p.seats; });
  let remaining = totalSeats - quotas.reduce((s, p) => s + p.seats, 0);
  quotas.sort((a, b) => b.rem - a.rem);
  for (let i = 0; i < remaining; i++) quotas[i].seats++;
  return quotas;
}

function renderTooltip(zone, zd) {
  document.getElementById('t-name').textContent = zone.name;
  document.getElementById('t-region').textContent = zone.region || '';

  // ── Seat hex grid ──
  const grid = document.getElementById('t-hexgrid');
  grid.innerHTML = '';
  const R = 10; // hex radius px (flat-top, so width = 2R, height = R*sqrt(3))
  const W = R * 2, H = Math.round(R * Math.sqrt(3));

  // Build party list from votes, filter <1% into Other
  const voteEntries = Object.entries(zone.votes || {});
  const hasVotes = voteEntries.some(([,pct]) => pct > 0);
  const mainParties = [], otherVotes = { id: '__other__', name: 'Other', color: '#666677', votes: 0 };
  voteEntries.forEach(([short, pct]) => {
    if (pct < 0.01) { otherVotes.votes += pct; return; }
    const party = PARTIES.find(p => p.short === short);
    const grp = party && party.intlGrp ? (window.GROUPS||{})[party.intlGrp] : null;
    const intlColor = grp ? grp.color : (party ? party.color : '#888');
    mainParties.push({ id: short, name: party ? party.name : short, color: party ? party.color : '#888', intlColor, votes: pct });
  });
  mainParties.sort((a, b) => b.votes - a.votes);

  // Allocate seats via largest remainder (or all grey if no votes yet)
  const seatList = [];
  if (hasVotes) {
    const allocated = allocateSeats(mainParties, zone.seats);
    allocated.sort((a, b) => b.seats - a.seats).forEach(p => {
      for (let i = 0; i < p.seats; i++) seatList.push({
        color: p.color,
        intlColor: p.intlColor || p.color,
        name: p.name
      });
    });
  } else {
    for (let i = 0; i < zone.seats; i++) seatList.push({ color: '#44444f', intlColor: '#44444f', name: 'No data' });
  }

  // ── Build intl group aggregates for intl tab ──
  const intlGroups = {}; // shorthand → { name, color, votes }
  if (parlTab === 'intl') {
    mainParties.forEach(p => {
      const party = PARTIES.find(q => q.short === p.id);
      const grpKey = party ? party.intlGrp : null;
      const grp = grpKey ? (window.GROUPS||{})[grpKey] : null;
      const key = grpKey || '—';
      if (!intlGroups[key]) intlGroups[key] = { name: grp ? grp.name : (grpKey || '—'), color: grp ? grp.color : p.color, votes: 0 };
      intlGroups[key].votes += p.votes;
    });
  }

  // Render flat-top hex SVGs in rows of max 4
  seatList.forEach(seat => {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '20'); svg.setAttribute('height', '18');
    svg.setAttribute('viewBox', '-1 -1 22 20');
    svg.style.cssText = 'display:block';
    const title = document.createElementNS('http://www.w3.org/2000/svg','title');
    title.textContent = seat.name; svg.appendChild(title);
    const cx = 10, cy = 9, hr = 9;
    const pts = Array.from({length:6},(_,i)=>{
      const a = Math.PI/3*i;
      return (cx+hr*Math.cos(a)).toFixed(2)+','+(cy+hr*Math.sin(a)).toFixed(2);
    }).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill', parlTab === 'intl' ? seat.intlColor : seat.color);
    poly.setAttribute('stroke', 'rgba(0,0,0,0.3)');
    poly.setAttribute('stroke-width', '1');
    svg.appendChild(poly);
    grid.appendChild(svg);
  });

  // ── Vote share list ──
  const vlist = document.getElementById('t-votes');
  vlist.innerHTML = '';

  if (parlTab === 'intl') {
    // Show group vote aggregates
    Object.values(intlGroups).sort((a,b) => b.votes - a.votes).forEach(g => {
      const row = document.createElement('div'); row.className = 'tvrow';
      const left = document.createElement('div'); left.className = 'tvcol';
      const sw = document.createElement('div'); sw.className = 'tvsw'; sw.style.background = g.color;
      const nm = document.createElement('span'); nm.textContent = g.name;

// PARLIAMENT ARC
// ══════════════════════════════════════════════════════════════════════════════

// Global seat list — computed once after sheet loads
// Each entry: { party, intlGrp, nation, color, intlColor }
window.SEATS = [];
// parlTab and parlFilter declared as globals above

function buildSeats() {
  window.SEATS = [];
  const zones = window.ZONES || [];

  // Build intl group → color map from GROUPS sheet data
  const intlColors = {};
  const groups = window.GROUPS || {};
  PARTIES.forEach(p => {
    if (!p.intlGrp) return;
    if (groups[p.intlGrp]) {
      intlColors[p.intlGrp] = groups[p.intlGrp].color;
    } else if (!intlColors[p.intlGrp]) {
      intlColors[p.intlGrp] = p.color; // fallback to party color
    }
  });

  zones.forEach(zone => {
    if (!zone.votes || !zone.seats) return;

    // Allocate seats via largest remainder (same as tooltip)
    const voteEntries = Object.entries(zone.votes).filter(([,pct]) => pct >= 0.01);
    const totalVote = voteEntries.reduce((s,[,p]) => s+p, 0);
    if (totalVote <= 0) {
      // No data — add grey placeholder seats
      for (let i = 0; i < zone.seats; i++) {
        window.SEATS.push({ party: null, intlGrp: null, nation: zone.region, color: '#44444f', intlColor: '#44444f' });
      }
      return;
    }

    // Largest remainder
    const quotas = voteEntries.map(([short, pct]) => {
      const party = PARTIES.find(p => p.short === short);
      return { party, short, quota: pct / totalVote * zone.seats };
    });
    quotas.forEach(q => { q.seats = Math.floor(q.quota); q.rem = q.quota - q.seats; });
    let rem = zone.seats - quotas.reduce((s,q) => s+q.seats, 0);
    quotas.sort((a,b) => b.rem - a.rem);
    for (let i = 0; i < rem; i++) quotas[i].seats++;

    quotas.forEach(q => {
      for (let i = 0; i < q.seats; i++) {
        const p = q.party;
        window.SEATS.push({
          party:    p ? p.name    : q.short,
          short:    q.short,
          intlGrp:  p ? p.intlGrp : null,
          nation:   zone.region,
          province: zone.name,
          color:    p ? p.color   : '#888',
          intlColor: p && p.intlGrp ? (intlColors[p.intlGrp] || p.color) : (p ? p.color : '#888'),
        });
      }
    });
  });

  // Sort: by intl group, then by party within group
  const intlOrder = {};
  let idx = 0;
  PARTIES.forEach(p => { if (p.intlGrp && intlOrder[p.intlGrp] === undefined) intlOrder[p.intlGrp] = idx++; });
  const partyOrder = {};
  PARTIES.forEach((p,i) => { partyOrder[p.short || p.name] = i; });

  window.SEATS.sort((a,b) => {
    const ai = a.intlGrp != null ? (intlOrder[a.intlGrp] ?? 999) : 999;
    const bi = b.intlGrp != null ? (intlOrder[b.intlGrp] ?? 999) : 999;
    if (ai !== bi) return ai - bi;
    const ap = partyOrder[a.short] ?? 999;
    const bp = partyOrder[b.short] ?? 999;
    return ap - bp;
  });
}

// ── Arc geometry — upper 4 edges of a pointy-top hexagon ────────────────────
// Pointy-top hex corners (angle = -90 + 60*i):
//   i=0: top apex (-90°)
//   i=1: upper-right (-30°)
//   i=2: lower-right (30°)
//   i=3: bottom-right (90°)  ← excluded
//   i=4: bottom-left (150°)  ← excluded
//   i=5: upper-left (210°=-150°)
// Upper 4 edges: lower-left(i=4) → upper-left(i=5) → apex(i=0) → upper-right(i=1) → lower-right(i=2)
// This gives the crown/chevron shape with the point at the top.

function hexUpperPath(cx, cy, radius) {
  const corner = i => {
    const a = Math.PI * (-90 + 60 * i) / 180;
    return { x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) };
  };
  // 5 points tracing the upper 4 edges left→right
  return [corner(4), corner(5), corner(0), corner(1), corner(2)];
}

function segLengths(pts) {
  const segs = [];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    segs.push(Math.sqrt(dx*dx + dy*dy));
  }
  return segs;
}

function pointAtDist(pts, segs, dist) {
  let walked = 0;
  for (let i = 0; i < segs.length; i++) {
    if (walked + segs[i] >= dist) {
      const t = (dist - walked) / segs[i];
      return {
        x: pts[i].x + (pts[i+1].x - pts[i].x) * t,
        y: pts[i].y + (pts[i+1].y - pts[i].y) * t
      };
    }
    walked += segs[i];
  }
  return pts[pts.length - 1];
}

function renderParliament() {
  const canvas = document.getElementById('parl-canvas');
  const wrap   = document.getElementById('parl-canvas-wrap');
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = wrap.clientWidth, H = wrap.clientHeight;
  ctx.clearRect(0,0,W,H);

  const seats = window.SEATS;
  if (!seats || !seats.length) return;
  const n = seats.length;

  const dotR    = Math.max(2.5, Math.min(6, H / 16));
  const rowGap  = dotR * 2.5;

  // Pointy-top hex: corner(i) at angle -90+60*i degrees.
  // Upper 4 edges run from corner[4](150°) to corner[2](30°) via apex corner[0](-90°).
  // corner[4].x = cx - R*sin(60°) = cx - R*√3/2  → set = padding
  // corner[4].y = cy + R*cos(60°) = cy + R*0.5   → set = H - padding
  // corner[0].y = cy - R           (apex, highest point)
  // We want: apex at top (cy - R ≈ dotR*2), bottom corners near canvas bottom.
  // From bottom corners: cy + R*0.5 = H - dotR  → cy = H - dotR - R*0.5
  // From width:          R*√3/2 = W/2 - dotR    → R = (W/2 - dotR) / (√3/2)
  // But also constrain apex to be within canvas: cy - R >= dotR
  //   H - dotR - R*0.5 - R >= dotR  →  R <= (H - 2*dotR) / 1.5
  const Rbywidth  = (W / 2 - dotR * 2) / (Math.sqrt(3) / 2);
  const Rbyheight = (H - dotR * 3) / 1.5;
  const outerR = Math.min(Rbywidth, Rbyheight);
  const cx = W / 2;
  const cy = H - dotR - outerR * 0.5;

  // Build concentric rows from inner to outer
  const minR = outerR * 0.28;
  const numRows = Math.max(1, Math.floor((outerR - minR) / rowGap));

  // Each row radius
  const radii = Array.from({length: numRows}, (_, i) => minR + i * rowGap);

  // Seats per row proportional to path length
  const rowPaths = radii.map(r => hexUpperPath(cx, cy, r));
  const rowLens  = rowPaths.map(pts => segLengths(pts).reduce((a,b)=>a+b,0));
  const totalLen = rowLens.reduce((a,b)=>a+b,0);
  const seatsPerRow = radii.map((_,i) => Math.round(n * rowLens[i] / totalLen));

  // Fix rounding
  let total = seatsPerRow.reduce((a,b)=>a+b,0);
  let ri = 0;
  while (total < n) { seatsPerRow[ri++ % numRows]++; total++; }
  while (total > n) { seatsPerRow[(--ri + numRows) % numRows]--; total--; }

  // ── Wedge seat placement ──────────────────────────────────────────────
  // Build a 2D grid[row][col] using each row's own even spacing (so seats
  // spread correctly across the full arc width at every radius).
  // Then read it column-first, outer→inner, so parties form angular wedges.
  //
  // For inner rows (fewer seats than nCols), we assign each inner seat to the
  // outer column it best represents using Bresenham-style distribution —
  // this gives each inner seat exactly one outer column slot with no duplicates
  // and no gaps.

  // Pre-compute segs for every row
  const rowSegs = rowPaths.map(pts => segLengths(pts));

  // grid[row] = array of {x,y} positions for that row, left→right
  const grid = rowPaths.map((pts, row) => {
    const segs  = rowSegs[row];
    const len   = rowLens[row];
    const count = seatsPerRow[row];
    return Array.from({ length: count }, (_, s) => {
      const t = (s + 0.5) / count;
      return pointAtDist(pts, segs, t * len);
    });
  });

  // nCols = outermost row (index numRows-1) which has the most seats
  const nCols = seatsPerRow[numRows - 1];

  // For each row, build a mapping: outerCol -> seatInThisRow (or null)
  // Uses Bresenham-style even distribution so every inner seat maps to
  // exactly one unique outer column, with no duplicates and no skips.
  const rowColMap = grid.map((rowSeats, row) => {
    const count = rowSeats.length;
    const map   = new Array(nCols).fill(null);
    // Distribute `count` items across `nCols` slots evenly
    for (let s = 0; s < count; s++) {
      // The outer column this inner seat owns: evenly spaced with half-step centering
      const outerCol = Math.floor((s + 0.5) * nCols / count);
      map[outerCol] = s;
    }
    return map;
  });

  // Read column-first, outer row (numRows-1) → inner row (0)
  const positions = [];
  let seatIdx = 0;

  for (let col = 0; col < nCols && seatIdx < n; col++) {
    for (let row = numRows - 1; row >= 0 && seatIdx < n; row--) {
      const innerSeat = rowColMap[row][col];
      if (innerSeat === null) continue; // this row has no seat in this column
      const pt = grid[row][innerSeat];
      positions.push({ x: pt.x, y: pt.y, seatIdx });
      seatIdx++;
    }
  }

  // Highlight logic
  function isHighlighted(seat) {
    if (!parlFilter) return true;
    if (parlTab === 'party')  return seat.short    === parlFilter;
    if (parlTab === 'intl')   return seat.intlGrp  === parlFilter;
    if (parlTab === 'nation') return seat.nation   === parlFilter;
    return true;
  }

  function seatColor(seat) {
    if (parlTab === 'intl') return seat.intlColor;
    return seat.color;
  }

  // Draw dimmed pass first, then highlighted on top
  for (const highlighted of [false, true]) {
    for (const pos of positions) {
      const seat = seats[pos.seatIdx];
      const hi = isHighlighted(seat);
      if (hi !== highlighted) continue;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, dotR - 0.5, 0, Math.PI * 2);
      ctx.fillStyle = hi ? seatColor(seat) : 'rgba(255,255,255,0.07)';
      ctx.fill();
    }
  }
}


// ── Legend ───────────────────────────────────────────────────────────────────
function buildParlLegend() {
  const el = document.getElementById('parl-legend');
  if (!el) return;   // ← guard
  legend.innerHTML = '';
  const seats = window.SEATS || [];

  let groups = [];
  if (parlTab === 'party') {
    const map = {};
    seats.forEach(s => {
      const key = s.short || s.party || '?';
      if (!map[key]) map[key] = { name: s.party, short: s.short, color: s.color, count: 0 };
      map[key].count++;
    });
    groups = Object.values(map).sort((a,b) => b.count - a.count);
    groups.forEach(g => { g.key = g.short; });
  } else if (parlTab === 'intl') {
    const map = {};
    const grps = window.GROUPS || {};
    seats.forEach(s => {
      const key = s.intlGrp || '—';
      if (!map[key]) {
        const grp = grps[key];
        map[key] = { name: grp ? grp.name : key, color: s.intlColor, count: 0 };
      }
      map[key].count++;
    });
    groups = Object.values(map).sort((a,b) => b.count - a.count);
    groups.forEach(g => { g.key = g.name === '—' ? null : g.name; });
  } else if (parlTab === 'nation') {
    const map = {};
    seats.forEach(s => {
      const key = s.nation || '—';
      if (!map[key]) map[key] = { name: key, color: '#7a7a72', count: 0 };
      map[key].count++;
    });
    groups = Object.values(map).sort((a,b) => b.count - a.count);
    groups.forEach(g => { g.key = g.name; });
  }

  groups.forEach(g => {
    const item = document.createElement('div');
    item.className = 'pl-item' + (parlFilter === g.key ? ' active' : '');
    const sw = document.createElement('div');
    sw.className = 'pl-swatch';
    sw.style.background = g.color;
    const nm = document.createElement('div');
    nm.className = 'pl-name';
    nm.textContent = g.name || '—';
    const ct = document.createElement('div');
    ct.className = 'pl-count';
    ct.textContent = g.count;
    item.appendChild(sw); item.appendChild(nm); item.appendChild(ct);
    item.addEventListener('click', () => {
      parlFilter = (parlFilter === g.key) ? null : g.key;
      buildParlLegend();
      renderParliament();
      applyMapFilter();
    });
    legend.appendChild(item);
  });
}

// ── Map filter ───────────────────────────────────────────────────────────────
function applyMapFilter() {
  // Build set of highlighted zone colors based on filter
  // Then re-render map with dimmed non-matching territories
  window.PARL_FILTER = { tab: parlTab, value: parlFilter };
  render();
}

// ── Tab switching ────────────────────────────────────────────────────────────
document.querySelectorAll('.ptab').forEach(btn => {
  btn.addEventListener('click', () => {
    parlTab = btn.dataset.tab;
    parlFilter = null;
    document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildParlLegend();
    renderParliament();
    renderResults();
    applyMapFilter();
    render(); // recolour map for new tab
  });
});

// Resize observer for parliament canvas
new ResizeObserver(() => renderParliament()).observe(document.getElementById('parl-canvas-wrap'));
