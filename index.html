<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex District Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./static/css/styles.css">
</head>
<body>
<div id="app">
  <header></header>
  <div id="body">
    <div id="map-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="url-bar">
        <input id="url-input" type="text" value="" placeholder="https://…">
        <span id="url-status"></span>
      </div>
    </div>
    <div id="sidebar">
      <div id="results-list"></div>
      <div id="total"></div>
      <div class="majtrack"><div class="majfill" id="maj-fill" style="width:0%"></div></div>
      <span id="maj-n" style="display:none"></span>
      <button id="edit-btn"></button>
    </div>
  </div>
  <div id="right-col">
    <div id="parliament">
      <div id="parl-tabs">
        <button class="ptab active" data-tab="party">Party</button>
        <button class="ptab" data-tab="intl">Intl. Group</button>
      </div>
      <div id="parl-canvas-wrap"><canvas id="parl-canvas"></canvas></div>
    </div>
    <div id="results-col">
      <div id="results-list-main"></div>
    </div>
    <div id="results-footer">
      <div id="total-main">—</div>
      <div class="majlabel"><span>Majority threshold</span><span id="maj-n-main">—</span></div>
      <div class="majtrack"><div class="majfill" id="maj-fill-main" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>Edit Parties</h2>
    <div id="party-edit-list"></div>
    <button id="add-party-btn" onclick="addParty()">+ Add party</button>
    <div id="modal-footer">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div id="tip">
  <div class="tn" id="t-name"></div>
  <div class="tregion" id="t-region"></div>
  <div class="thexgrid" id="t-hexgrid"></div>
  <div class="tvotes" id="t-votes"></div>
  <div style="display:none" id="t-party"><div id="t-psw"></div><span id="t-pname"></span></div>
</div>

<!--
  Load order matters:
    1. helpers.js   — constants + pure utilities (no DOM deps)
    2. ui.js        — DOM-dependent UI (PARTIES, modal, tooltip, results)
    3. map.js       — canvas state + rendering (calls renderResults, parlTab)
    4. parliament.js — parliament arc (calls render, renderResults)
    5. sheets.js    — async data loader (calls everything above)
-->
<script src="static/js/helpers.js"></script>
<script src="static/js/ui.js"></script>
<script src="static/js/map.js"></script>
<script src="static/js/parliament.js"></script>
<script src="static/js/sheets.js"></script>

<script>
  // ── Boot ──────────────────────────────────────────────────────────────────
  resizeCanvas();
  render();
  loadFromSheet();
</script>
</body>
</html>
